<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Post Assistant | felice</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #fcfaf8; /* 柔らかいオフホワイト */
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            font-size: 1.1rem;
            color: #8c8279; /* グレージュ系 */
            letter-spacing: 0.1em;
            margin-bottom: 35px;
            font-weight: 300;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #8c8279;
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #fafafa;
        }
        button {
            width: 100%;
            padding: 16px;
            background-color: #8c8279;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }
        button:hover { background-color: #6d645d; }
        .result-area {
            margin-top: 30px;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 4px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.8;
            color: #333;
            min-height: 200px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SALON POST ASSISTANT</h1>
    
    <label for="topic">トピック</label>
    <input type="text" id="topic" placeholder="例：毛穴ケアの重要性、新メニュー">

    <label for="postType">投稿タイプ</label>
    <select id="postType">
        <option value="通常フィード投稿（お客様の悩みに寄り添い、プロの視点で解説する丁寧な長文）">フィード投稿（丁寧・解説）</option>
        <option value="ストーリーズ用（大切なポイントだけをミニマルに伝える、洗練された短文）">ストーリーズ（簡潔・洗練）</option>
    </select>

    <label for="tone">文章のニュアンス</label>
    <select id="tone">
        <option value="落ち着いた、誠実で信頼感のある">落ち着き・信頼</option>
        <option value="シンプルで凛とした、都会的な">シンプル・凛とした</option>
        <option value="穏やかで、優しく包み込むような">穏やか・優しさ</option>
    </select>

    <button onclick="generateText()">文章を構成する</button>

    <div id="result" class="result-area">ここに文章が表示されます。</div>
</div>

<script>
    async function generateText() {
        const topic = document.getElementById('topic').value;
        const postType = document.getElementById('postType').value;
        const tone = document.getElementById('tone').value;
        const resultArea = document.getElementById('result');

        if (!topic) {
            alert("トピックを入力してください");
            return;
        }

        resultArea.innerText = "執筆中...";

        try {
            const response = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { 
                            role: "system", 
                            content: `あなたは「felice.kaho」というアカウントを運営する、非常に洗練されたセンスを持つプロのエステティシャンです。
                            
                            【文章スタイルのルール】
                            1. 誠実、知的、かつ温かみのあるトーン。過度な勧誘や煽りはしない。
                            2. 絵文字は「✨」「🌿」「🤍」「🕯️」など、落ち着いたトーンのものを文末に1つ置く程度にする。
                            3. 顔文字（ (^^) など）は絶対に、一切使用しない。
                            4. 改行を適切に入れ、読み手が「余白」を感じられる美しいレイアウトにする。
                            5. 専門的な知識を、お客様の悩みに寄り添う言葉で解釈して伝える。
                            6. 指定された投稿タイプ（フィードまたはストーリー）に最適な長さに調節する。`
                        },
                        { 
                            role: "user", 
                            content: `「${topic}」について、${postType}を作成してください。ニュアンスは「${tone}」で、最後にハッシュタグを5つ添えてください。` 
                        }
                    ]
                })
            });

            const data = await response.json();
            resultArea.innerText = data.choices[0].message.content;
        } catch (error) {
            resultArea.innerText = "接続に失敗しました。";
        }
    }
</script>

</body>
</html>
