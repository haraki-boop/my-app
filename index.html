<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Post Assistant | felice</title>
    <style>
        /* デザイン：洗練されたミニマル・グレージュスタイル */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #fcfaf8; /* 柔らかいオフホワイト */
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            font-size: 1.1rem;
            color: #8c8279; /* グレージュ */
            letter-spacing: 0.15em;
            margin-bottom: 35px;
            font-weight: 300;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #8c8279;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #fafafa;
            font-family: inherit;
            color: #333;
        }
        textarea {
            height: 120px;
            resize: none;
            line-height: 1.5;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #8c8279;
            background-color: #fff;
        }
        button {
            width: 100%;
            padding: 18px;
            background-color: #8c8279;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #6d645d;
        }
        .result-area {
            margin-top: 30px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 4px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.9;
            color: #333;
            min-height: 250px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SALON POST ASSISTANT</h1>
    
    <label for="topic">1. トピック（必須）</label>
    <input type="text" id="topic" placeholder="例：冬の乾燥対策、巡りの改善">

    <label for="sourceInfo">2. 参考情報・メモ（任意）</label>
    <textarea id="sourceInfo" placeholder="参考URLや、盛り込みたい具体的なエピソード、大切にしたい考え方などを入力してください"></textarea>

    <label for="postType">3. 投稿タイプの仕分け</label>
    <select id="postType">
        <option value="通常フィード投稿（300-500文字程度。悩み・原因・メカニズム・解決策を理論的かつ丁寧に解説する構成）">通常投稿（しっかり解説）</option>
        <option value="ストーリーズ用（100文字以内。大切なポイント1点のみをミニマルに伝え、余白を感じさせる簡潔な構成）">ストーリーズ（簡潔・短文）</option>
    </select>

    <button onclick="generateText()">文章を構成する</button>

    <div id="result" class="result-area">ここに文章が表示されます。</div>
</div>

<script>
    async function generateText() {
        const topic = document.getElementById('topic').value;
        const sourceInfo = document.getElementById('sourceInfo').value;
        const postType = document.getElementById('postType').value;
        const resultArea = document.getElementById('result');

        if (!topic) {
            alert("トピックを入力してください");
            return;
        }

        resultArea.innerText = "feliceのスタイルで執筆中...";

        try {
            const response = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { 
                            role: "system", 
                            content: `あなたはサロン「felice」を運営する、洗練されたオーナーエステティシャンです。
                            Instagram（@felice.kaho）の分析に基づき、以下の「思考」と「文章ルール」を厳守して執筆してください。

                            【思考の軸】
                            ・表面的なケアではなく、血液、内臓、自律神経、ホルモンなど「根本的な体質改善」を最重視。
                            ・女性特有の悩み（PMS、更年期、産前産後等）を当たり前と思わず、寄り添う姿勢。
                            ・忙しい女性が自分を慈しむ時間（余白・セルフラブ）の大切さを説く。

                            【文章構成ルール】
                            1. 顔文字は一切使用しない（「！」「？」などの記号も控えめに）。
                            2. 絵文字は文末に「🌿」「✨」「🤍」「🕯️」などを1つ置く程度にする。
                            3. 語尾は凛とした誠実な敬語（〜です、〜ます）。
                            4. 改行を多く入れ、スマホで見た時に「余白」を感じさせる美しいレイアウトにする。
                            5. 専門用語は使いつつ、メカニズムを納得感のある言葉で噛み砕いて説明する。
                            6. 指定された投稿タイプ（フィードまたはストーリー）に合わせ、長さを厳密に調整する。

                            【ハッシュタグのルール】
                            ・合計5つ。以下の3つは必ず最後に含めること：
                               #体質改善 #肌質改善 #女性特有の症状
                            ・残りの2つは投稿内容に合わせた関連タグを作成すること。`
                        },
                        { 
                            role: "user", 
                            content: `トピック：${topic}\n参考情報：${sourceInfo}\n投稿タイプ：${postType}` 
                        }
                    ]
                })
            });

            const data = await response.json();
            resultArea.innerText = data.choices[0].message.content;
        } catch (error) {
            resultArea.innerText = "接続に失敗しました。VercelやOpenAIの設定を確認してください。";
        }
    }
</script>

</body>
</html>
