<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Post Assistant | felice</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #fcfaf8;
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            font-size: 1.1rem;
            color: #8c8279;
            letter-spacing: 0.15em;
            margin-bottom: 35px;
            font-weight: 300;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #8c8279;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #fafafa;
            font-family: inherit;
        }
        textarea { height: 120px; resize: none; }
        
        /* メインボタン */
        .btn-generate {
            width: 100%;
            padding: 18px;
            background-color: #8c8279;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-generate:hover { background-color: #6d645d; }

        /* コピーボタン */
        .btn-copy {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #fff;
            color: #8c8279;
            border: 1px solid #8c8279;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: none; /* 初期状態は非表示 */
            transition: all 0.3s ease;
        }
        .btn-copy:hover { background-color: #fcfaf8; }

        .result-area {
            margin-top: 30px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 4px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.9;
            color: #333;
            min-height: 200px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SALON POST ASSISTANT</h1>
    
    <label for="topic">1. トピック（必須）</label>
    <input type="text" id="topic" placeholder="例：冬の乾燥対策">

    <label for="sourceInfo">2. 参考情報・メモ（任意）</label>
    <textarea id="sourceInfo" placeholder="参考情報などを入力してください"></textarea>

    <label for="postType">3. 投稿タイプの仕分け</label>
    <select id="postType">
        <option value="通常フィード投稿（300-500文字程度。丁寧な解説構成）">通常投稿（しっかり解説）</option>
        <option value="ストーリーズ用（100文字以内。簡潔な構成）">ストーリーズ（簡潔・短文）</option>
    </select>

    <button class="btn-generate" onclick="generateText()">文章を構成する</button>

    <div id="result" class="result-area">ここに文章が表示されます。</div>
    
    <button id="copyBtn" class="btn-copy" onclick="copyResult()">文章をコピーする</button>
</div>

<script>
    async function generateText() {
        const topic = document.getElementById('topic').value;
        const sourceInfo = document.getElementById('sourceInfo').value;
        const postType = document.getElementById('postType').value;
        const resultArea = document.getElementById('result');
        const copyBtn = document.getElementById('copyBtn');

        if (!topic) {
            alert("トピックを入力してください");
            return;
        }

        resultArea.innerText = "執筆中...";
        copyBtn.style.display = "none"; // 再生成時は隠す

        try {
            const response = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { 
                            role: "system", 
                            content: `あなたはサロン「felice」のエステティシャンです。
                            【ルール】顔文字禁止。絵文字は文末に1つ。凛とした誠実な敬語。
                            ハッシュタグは必ず以下の5つ：
                            #体質改善 #肌質改善 #女性特有の症状 + 内容に合うタグ2つ`
                        },
                        { 
                            role: "user", 
                            content: `トピック：${topic}\n参考情報：${sourceInfo}\n投稿タイプ：${postType}` 
                        }
                    ]
                })
            });

            const data = await response.json();
            const text = data.choices[0].message.content;
            resultArea.innerText = text;
            
            // 生成が完了したらコピーボタンを表示
            copyBtn.style.display = "block";
        } catch (error) {
            resultArea.innerText = "接続に失敗しました。";
        }
    }

    // コピー機能
    function copyResult() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerText = "コピーしました！";
            setTimeout(() => {
                copyBtn.innerText = "文章をコピーする";
            }, 2000);
        }).catch(err => {
            alert("コピーに失敗しました。");
        });
    }
</script>

</body>
</html>
