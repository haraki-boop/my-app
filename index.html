<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Post Assistant | felice</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #fcfaf8;
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            font-size: 1.1rem;
            color: #8c8279;
            letter-spacing: 0.15em;
            margin-bottom: 35px;
            font-weight: 300;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #8c8279;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #fafafa;
            font-family: inherit;
        }
        textarea {
            height: 120px;
            resize: none;
        }
        button {
            width: 100%;
            padding: 18px;
            background-color: #8c8279;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
        }
        button:hover { background-color: #6d645d; }
        .result-area {
            margin-top: 30px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 4px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.9;
            color: #333;
            min-height: 250px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SALON POST ASSISTANT</h1>
    
    <label for="topic">1. トピック（必須）</label>
    <input type="text" id="topic" placeholder="例：冬の乾燥対策、巡りの改善">

    <label for="sourceInfo">2. 参考情報・メモ（任意）</label>
    <textarea id="sourceInfo" placeholder="参考URLや具体的なエピソードを入力してください"></textarea>

    <label for="postType">3. 投稿タイプの仕分け</label>
    <select id="postType">
        <option value="通常フィード投稿（300-500文字程度。悩み・原因・解決策を丁寧に解説する構成）">通常投稿（しっかり解説）</option>
        <option value="ストーリーズ用（100文字以内。要点をミニマルに伝える簡潔な構成）">ストーリーズ（簡潔・短文）</option>
    </select>

    <button onclick="generateText()">文章を構成する</button>

    <div id="result" class="result-area">ここに文章が表示されます。</div>
</div>

<script>
    async function generateText() {
        const topic = document.getElementById('topic').value;
        const sourceInfo = document.getElementById('sourceInfo').value;
        const postType = document.getElementById('postType').value;
        const resultArea = document.getElementById('result');

        if (!topic) {
            alert("トピックを入力してください");
            return;
        }

        resultArea.innerText = "feliceのスタイルで執筆中...";

        try {
            const response = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { 
                            role: "system", 
                            content: `あなたはサロン「felice」のオーナーエステティシャンです。以下のルールを「絶対」に守って執筆してください。

                            【文章ルール】
                            ・凛とした誠実な敬語（〜です、〜ます）。顔文字は絶対禁止。
                            ・絵文字は文末に落ち着いたものを1つ置くのみ。
                            ・根本的な体質改善（自律神経、血液、内臓等）を軸にした専門的な内容。
                            ・投稿タイプに合わせ、長さを厳密に調整する。

                            【ハッシュタグの絶対ルール】
                            ハッシュタグは必ず以下の5つのみを、文章の最後に記載してください。
                            1. #体質改善 （固定）
                            2. #肌質改善 （固定）
                            3. #女性特有の症状 （固定）
                            4. 内容に合わせた関連タグ1
                            5. 内容に合わせた関連タグ2`
                        },
                        { 
                            role: "user", 
                            content: `トピック：${topic}\n参考情報：${sourceInfo}\n投稿タイプ：${postType}\n\nハッシュタグは指定された3つを必ず含め、合計5つで出力してください。` 
                        }
                    ]
                })
            });

            const data = await response.json();
            resultArea.innerText = data.choices[0].message.content;
        } catch (error) {
            resultArea.innerText = "接続に失敗しました。";
        }
    }
</script>

</body>
</html>
